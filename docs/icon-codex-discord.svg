<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Codex Discord Controller icon</title>
  <desc id="desc">Rounded square app icon with a chat bubble and command prompt motif.</desc>
  <defs>
    <linearGradient id="bg" x1="140" y1="108" x2="882" y2="936" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#09111f"/>
      <stop offset="0.48" stop-color="#2356d7"/>
      <stop offset="1" stop-color="#ff7d59"/>
    </linearGradient>
    <radialGradient id="coolGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(258 210) rotate(33) scale(432 368)">
      <stop offset="0" stop-color="#78edff" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#78edff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(780 820) rotate(148) scale(468 404)">
      <stop offset="0" stop-color="#ffd5a8" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#ffd5a8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="288" y1="348" x2="736" y2="612" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d172a"/>
      <stop offset="1" stop-color="#192c4f"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="26" flood-color="#060b15" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="232" fill="url(#coolGlow)"/>
  <rect width="1024" height="1024" rx="232" fill="url(#warmGlow)"/>

  <g opacity="0.88">
    <path d="M178 594C178 405 314 266 488 242" fill="none" stroke="#7cecff" stroke-linecap="round" stroke-width="38"/>
    <path d="M842 430C842 619 706 758 532 782" fill="none" stroke="#ffd0a7" stroke-linecap="round" stroke-width="38"/>
  </g>

  <g filter="url(#cardShadow)">
    <path d="M338 642V758C338 782 366 796 386 781L506 690V642H338Z" fill="#f7faff"/>
    <rect x="188" y="232" width="648" height="432" rx="132" fill="#f7faff"/>
    <rect x="260" y="322" width="504" height="278" rx="76" fill="url(#panel)"/>

    <g opacity="0.8">
      <circle cx="326" cy="392" r="14" fill="#ff8f7d"/>
      <circle cx="372" cy="392" r="14" fill="#ffd27c"/>
      <circle cx="418" cy="392" r="14" fill="#79f1b9"/>
    </g>

    <path d="M340 460L420 520L340 580" fill="none" stroke="#79f1b9" stroke-linecap="round" stroke-linejoin="round" stroke-width="36"/>
    <rect x="476" y="500" width="158" height="34" rx="17" fill="#dbe7ff"/>
    <rect x="662" y="448" width="34" height="138" rx="17" fill="#79f1b9"/>
  </g>

  <g opacity="0.92">
    <circle cx="730" cy="230" r="28" fill="#f7faff"/>
    <path d="M730 184V276" fill="none" stroke="#f7faff" stroke-linecap="round" stroke-width="18"/>
    <path d="M684 230H776" fill="none" stroke="#f7faff" stroke-linecap="round" stroke-width="18"/>
  </g>
